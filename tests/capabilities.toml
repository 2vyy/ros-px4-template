[capabilities.arm_takeoff]
description = "Vehicle arms in OFFBOARD and reaches target altitude"
requires = []
platforms = [
    "sim",
]
scenario_file = "01_arm_takeoff.py"
sim_vision = "none"
sim_overlay = "hover"

[capabilities.hover_hold]
description = "Vehicle holds position within tolerance for 30s"
requires = ["arm_takeoff"]
platforms = [
    "sim",
]
scenario_file = "02_hover_hold.py"
sim_vision = "none"
sim_overlay = "hover"

[capabilities.waypoint_nav]
description = "Vehicle follows a multi-waypoint path"
requires = ["arm_takeoff"]
platforms = [
    "sim",
]
scenario_file = "03_waypoint.py"
sim_vision = "none"
sim_overlay = "auto_arm"

[capabilities.aruco_hover]
description = "Vehicle detects ArUco marker and enters marker_hover phase"
requires = ["arm_takeoff"]
platforms = [
    "sim",
]
scenario_file = "05_aruco_hover.py"
sim_vision = "aruco"
sim_overlay = "marker_hover"

[capabilities.search_relocalize]
description = "Vehicle searches a lawnmower pattern, relocalizes on a known marker (/drone/pose_override), and returns to origin"
requires = ["waypoint_nav", "aruco_hover"]
platforms = [
    "sim",
]
scenario_file = "06_search_relocalize.py"
sim_vision = "aruco"
sim_overlay = "search_relocalize"

[capabilities.yaw_control]
description = "Mission-commanded ENU yaw reaches PX4 as NED heading and the vehicle turns to it"
requires = ["arm_takeoff"]
platforms = [
    "sim",
]
scenario_file = "07_yaw_control.py"
sim_vision = "none"
sim_overlay = "yaw_demo"

[capabilities.precision_land]
description = "Vehicle centers on the marker, descends, and PX4 lands it; no auto-rearm"
requires = ["aruco_hover"]
platforms = [
    "sim",
]
scenario_file = "08_precision_land.py"
sim_vision = "aruco"
sim_overlay = "precision_land"

[capabilities.aruco_hover_real]
description = "Vehicle detects a REAL rendered ArUco marker via the camera model and reports an accurate body-FLU offset (not fabricated)"
requires = ["aruco_hover"]
platforms = [
    "sim",
]
scenario_file = "09_aruco_hover_real.py"
sim_vision = "aruco"
sim_overlay = "auto_arm"
sim_model = "x500_mono_cam_down"
sim_world = "marker_field"
