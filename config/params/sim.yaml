offboard_controller:
  ros__parameters:
    auto_arm: true
    arm_delay_s: 15.0
    offboard_prestream_s: 3.0
    target_altitude_m: 3.0

mission_manager:
  ros__parameters:
    # Use the inspect_aruco waypoint mission for sim. Set to "" for hover-only mode.
    mission_file: "config/missions/inspect_aruco.yaml"
    tick_rate_hz: 10.0
    takeoff_altitude_m: 3.0
