offboard_controller:
  ros__parameters:
    auto_arm: true
    arm_delay_s: 10.0
    offboard_prestream_s: 3.0
    target_altitude_m: 3.0

mission_manager:
  ros__parameters:
    path_file: "config/paths/demo.yaml"
    tick_rate_hz: 10.0
    takeoff_altitude_m: 3.0
    takeoff_altitude_tolerance_m: 0.1
    tolerance_m: 0.4
    z_tolerance_m: 0.0
    hold_s: 2.0
    marker_hold_s: 10.0
