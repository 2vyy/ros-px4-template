# yaml-language-server: $schema=../../schemas/mission.schema.json
# Fly the path, then center over the (unknown) marker and hold. Used by 05_aruco_hover.
requires: [aruco_hover]
mission:
  initial: takeoff
  safety:
    - {guard: estimate_invalid, to: hold_safe}
    - {guard: inputs_stale, params: {t: 1.0}, to: hold_safe}
  states:
    takeoff:      {behavior: hold, params: {z: 3.0}}
    follow:       {behavior: follow_waypoints, params: {path_file: config/paths/demo.yaml}}
    marker_hover: {behavior: center_on_marker, params: {target_id: 0, altitude_m: 3.0, hold_s: 10.0, tolerance_m: 0.4}}
    done:         {behavior: hold}
    hold_safe:    {behavior: hold}
  transitions:
    - {from: takeoff,      guard: armed_at_altitude, to: follow}
    - {from: follow,       guard: waypoints_done,     to: marker_hover}
    - {from: marker_hover, guard: hold_complete,      to: done}
  terminal: [done]
