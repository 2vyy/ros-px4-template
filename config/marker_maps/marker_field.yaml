# marker_id -> world pose (anchored-ENU, origin = takeoff point). Meters.
# Matches sim/worlds/marker_field.sdf. Select this map (marker_localizer's
# marker_map_file parameter) when localizing against IDs 1 and 2; the
# default config/markers.yaml only has marker 0.
markers:
  0: {x: 8.0, y: 0.0, z: 0.0}
  1: {x: -6.0, y: 10.0, z: 0.0}
  2: {x: 0.0, y: -12.0, z: 0.0}
