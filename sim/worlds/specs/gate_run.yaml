# Challenge spec: example gate run — two pylons as a gate corridor plus
# markers 0 (far) and 3 (near gate exit). Origin climb column stays clear.
name: gate_run
markers:
  - {id: 0, x: 8.0, y: 0.0}
  - {id: 3, x: 5.0, y: 0.0}
obstacles:
  - {type: cylinder, name: pylon_left, x: 2.0, y: 1.5, radius: 0.3, height: 2.0}
  - {type: cylinder, name: pylon_right, x: 2.0, y: -1.5, radius: 0.3, height: 2.0}
